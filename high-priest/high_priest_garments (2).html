<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garments of the High Priest — Bigdei Kohen Gadol</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0a02;font-family:'Crimson Text',Georgia,serif;color:#e8dfc0;overflow:hidden;user-select:none}
#wrap{display:flex;width:100vw;height:100vh;overflow:hidden}
#canvasWrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
#header{position:absolute;top:12px;left:0;right:0;text-align:center;pointer-events:none;z-index:10}
#header h1{font-family:'Cinzel',serif;font-size:17px;color:#d4af37;letter-spacing:2px;text-shadow:0 2px 8px #000}
#header p{font-size:10px;color:rgba(212,175,55,.5);font-style:italic;letter-spacing:1px;margin-top:2px}
#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(212,175,55,.42);letter-spacing:1px;pointer-events:none;white-space:nowrap;background:rgba(0,0,0,.6);padding:4px 12px;text-align:center}

#stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.scene{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease}
.scene.active{opacity:1;pointer-events:auto}

svg{display:block;max-width:100%;max-height:100%}

/* Garment hover/active states */
.garment{cursor:pointer;transition:filter .2s ease}
.garment:hover{filter:brightness(1.25) drop-shadow(0 0 8px rgba(255,220,100,.5))}
.garment.active{filter:brightness(1.3) drop-shadow(0 0 12px rgba(255,220,100,.7))}

.stone{cursor:pointer;transition:transform .2s ease,filter .2s ease;transform-origin:center;transform-box:fill-box}
.stone:hover{transform:scale(1.15);filter:brightness(1.4) drop-shadow(0 0 6px rgba(255,255,255,.6))}
.stone.active{filter:brightness(1.4) drop-shadow(0 0 10px rgba(255,255,255,.8))}

.label{font-family:'Cinzel',serif;fill:rgba(212,175,55,.7);font-size:10px;letter-spacing:1.5px;text-anchor:middle;pointer-events:none;text-shadow:0 1px 3px #000}
.label-heb{font-family:Georgia,serif;font-style:italic;fill:rgba(212,175,55,.5);font-size:9px;text-anchor:middle;pointer-events:none}

/* Clickable label groups — point at the same artifacts as the figure */
.label-link{cursor:pointer;transition:opacity .2s ease}
.label-link text{transition:fill .2s ease}
.label-link line{transition:stroke .2s ease}
.label-link:hover .label{fill:#ffe488}
.label-link:hover .label-heb{fill:rgba(255,228,136,.9)}
.label-link:hover line{stroke:rgba(255,220,100,.7);stroke-width:1}
.label-link.active .label{fill:#ffe488}
.label-link.active .label-heb{fill:rgba(255,228,136,.9)}

/* Christ-mode glow — every garment radiant simultaneously */
.christ-mode .garment{filter:brightness(1.18) drop-shadow(0 0 12px rgba(255,220,100,.35))}
.christ-mode #auraGlow{opacity:0.18!important}
#auraGlow{transition:opacity .5s ease}
.garment{transition:filter .35s ease}

/* Control buttons */
#modebar{position:absolute;top:58px;right:12px;display:flex;flex-direction:column;gap:5px;z-index:10}
.mbtn{background:rgba(6,4,0,.9);border:1px solid rgba(212,175,55,.3);color:rgba(212,175,55,.65);font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;padding:6px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;text-align:center;border-radius:2px}
.mbtn:hover,.mbtn.on{background:rgba(212,175,55,.18);border-color:#d4af37;color:#d4af37}

#backbtn{position:absolute;top:58px;left:12px;background:rgba(6,4,0,.9);border:1px solid rgba(212,175,55,.4);color:#d4af37;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.2px;padding:7px 14px;cursor:pointer;display:none;z-index:10;border-radius:2px}
#backbtn:hover{background:rgba(212,175,55,.18)}
#backbtn.on{display:block}

/* Side panel — matching tabernacle */
#panel{width:0;min-width:0;height:100vh;background:linear-gradient(170deg,#130f04,#080500);border-left:1px solid rgba(212,175,55,.18);overflow:hidden;transition:width .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;flex-shrink:0}
#panel.open{width:420px;min-width:420px}
.ph{padding:22px 22px 14px;border-bottom:1px solid rgba(212,175,55,.1);position:relative;flex-shrink:0}
.pclose{position:absolute;top:14px;right:14px;background:none;border:none;color:rgba(212,175,55,.4);font-size:18px;cursor:pointer}
.pclose:hover{color:#d4af37}
.ptitle{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#d4af37;margin-bottom:5px;line-height:1.3}
.pheb{font-size:11.5px;color:rgba(212,175,55,.55);font-style:italic;line-height:1.6;white-space:pre-line}

.pbody{padding:16px 22px 40px;overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:rgba(212,175,55,.3) transparent}
.pbody::-webkit-scrollbar{width:3px}
.pbody::-webkit-scrollbar-thumb{background:rgba(212,175,55,.3)}

.ps{margin-bottom:16px}
.psl{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:2.5px;color:rgba(212,175,55,.36);text-transform:uppercase;margin-bottom:6px}
.psc{background:rgba(212,175,55,.05);border-left:2px solid rgba(212,175,55,.32);padding:10px 12px;font-style:italic;font-size:12px;line-height:1.65;color:#d4c98a;margin-bottom:8px}
.ref{font-size:9.5px;color:rgba(212,175,55,.36);font-style:normal;margin-top:4px;font-family:'Cinzel',serif;letter-spacing:0.8px}
.ptx{font-size:12px;line-height:1.85;color:#a0987a}
.ptx strong{color:#d4af37;font-weight:600}
hr.dv{border:none;border-top:1px solid rgba(212,175,55,.07);margin:14px 0}

/* Tribe-specific touches */
.tribe-meta{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.meta-pill{background:rgba(212,175,55,.06);border:1px solid rgba(212,175,55,.18);padding:5px 10px;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:1.2px;color:#d4af37;border-radius:2px}
.stone-display{display:flex;align-items:center;gap:14px;margin:6px 0 14px;padding:12px;background:rgba(212,175,55,.04);border:1px solid rgba(212,175,55,.15)}
.stone-vis{width:42px;height:42px;border-radius:50%;border:2px solid rgba(212,175,55,.4);box-shadow:inset 0 -4px 8px rgba(0,0,0,.5),inset 0 4px 8px rgba(255,255,255,.3),0 0 12px rgba(255,255,255,.1);flex-shrink:0}
.stone-info{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:#d4af37;line-height:1.7}
.stone-info span{color:rgba(212,175,55,.55);font-style:italic}
</style>
</head>
<body>
<div id="wrap">
 <div id="canvasWrap">
  <div id="header">
   <h1>BIGDEI KOHEN GADOL · בִּגְדֵי כֹּהֵן גָּדוֹל</h1>
   <p>The Garments of the High Priest</p>
  </div>

  <button id="backbtn">◁ BACK TO HIGH PRIEST</button>

  <div id="modebar">
   <div class="mbtn on" id="vFull">Full Vestments</div>
   <div class="mbtn" id="vYom">Yom Kippur Linen</div>
   <div class="mbtn" id="vChrist">Christ Fulfills All</div>
  </div>

  <div id="stage">
    <!-- MAIN SCENE: full priest figure -->
    <div class="scene active" id="sceneMain">
      <svg id="priestSvg" viewBox="-60 -10 600 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Gradients for garment colors -->
          <linearGradient id="gLinen" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#f4ecc8"/>
            <stop offset="1" stop-color="#d8cc94"/>
          </linearGradient>
          <linearGradient id="gBlue" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#2a4dc0"/>
            <stop offset="1" stop-color="#152870"/>
          </linearGradient>
          <linearGradient id="gPurple" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#6a2890"/>
            <stop offset="1" stop-color="#3e1058"/>
          </linearGradient>
          <linearGradient id="gScarlet" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#c41e2a"/>
            <stop offset="1" stop-color="#7a0f18"/>
          </linearGradient>
          <linearGradient id="gGold" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#ffe488"/>
            <stop offset="0.5" stop-color="#d4af37"/>
            <stop offset="1" stop-color="#8a6818"/>
          </linearGradient>
          <linearGradient id="gEphod" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0" stop-color="#1a3ea8"/>
            <stop offset="0.33" stop-color="#5a2080"/>
            <stop offset="0.66" stop-color="#a51820"/>
            <stop offset="1" stop-color="#d4c898"/>
          </linearGradient>
          <linearGradient id="gFlesh" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#c9a878"/>
            <stop offset="1" stop-color="#8a6840"/>
          </linearGradient>
          <radialGradient id="gShoulderStone" cx="0.35" cy="0.35">
            <stop offset="0" stop-color="#5a5048"/>
            <stop offset="0.5" stop-color="#1a1410"/>
            <stop offset="1" stop-color="#000"/>
          </radialGradient>
          <radialGradient id="gPlateGold" cx="0.4" cy="0.3">
            <stop offset="0" stop-color="#fff4a0"/>
            <stop offset="0.5" stop-color="#d4af37"/>
            <stop offset="1" stop-color="#7a5818"/>
          </radialGradient>
          <filter id="softGlow"><feGaussianBlur stdDeviation="3"/></filter>
          <pattern id="checker" patternUnits="userSpaceOnUse" width="14" height="14">
            <rect width="14" height="14" fill="url(#gLinen)"/>
            <path d="M0 7h14M7 0v14" stroke="rgba(180,150,80,0.18)" stroke-width="0.5"/>
          </pattern>
        </defs>

        <!-- Sacred glow behind figure -->
        <ellipse id="auraGlow" cx="240" cy="430" rx="220" ry="340" fill="url(#gGold)" opacity="0.04" filter="url(#softGlow)"/>

        <!-- ============ FIGURE — LAYERED FROM BACK TO FRONT ============ -->

        <!-- 1. MIKHNESEI — linen breeches (mostly hidden, only at ankles) -->
        <g class="garment" data-key="mikhnesei">
          <rect x="195" y="700" width="40" height="40" fill="url(#gLinen)" stroke="rgba(150,120,60,.4)" stroke-width="0.8"/>
          <rect x="245" y="700" width="40" height="40" fill="url(#gLinen)" stroke="rgba(150,120,60,.4)" stroke-width="0.8"/>
        </g>

        <!-- 2. KETHONETH — white linen tunic (visible at sleeves and below robe) -->
        <g class="garment" data-key="kethoneth">
          <!-- sleeves extending from arms -->
          <path d="M 90,260 Q 70,360 80,440 L 130,440 Q 130,360 130,260 Z" fill="url(#checker)" stroke="rgba(150,120,60,.5)" stroke-width="1"/>
          <path d="M 390,260 Q 410,360 400,440 L 350,440 Q 350,360 350,260 Z" fill="url(#checker)" stroke="rgba(150,120,60,.5)" stroke-width="1"/>
          <!-- bottom of tunic visible below robe hem -->
          <rect x="170" y="690" width="140" height="20" fill="url(#checker)" stroke="rgba(150,120,60,.5)" stroke-width="0.8"/>
        </g>

        <!-- HEAD AND NECK — drawn but not interactive -->
        <g id="head">
          <!-- neck -->
          <rect x="220" y="200" width="40" height="40" fill="url(#gFlesh)"/>
          <!-- face/head -->
          <ellipse cx="240" cy="160" rx="58" ry="68" fill="url(#gFlesh)" stroke="rgba(80,50,20,.4)" stroke-width="1"/>
          <!-- beard -->
          <path d="M 195,180 Q 200,230 240,250 Q 280,230 285,180 Q 280,210 240,220 Q 200,210 195,180 Z" fill="#3a2812" opacity="0.85"/>
          <path d="M 200,170 Q 220,200 240,205 Q 260,200 280,170" fill="none" stroke="#2a1808" stroke-width="0.8" opacity="0.5"/>
          <!-- closed serene eyes -->
          <path d="M 215,150 Q 222,153 229,150" fill="none" stroke="#1a0a04" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M 251,150 Q 258,153 265,150" fill="none" stroke="#1a0a04" stroke-width="1.4" stroke-linecap="round"/>
          <!-- subtle nose -->
          <path d="M 240,158 Q 238,170 240,178" fill="none" stroke="rgba(80,50,20,.3)" stroke-width="0.8"/>
        </g>

        <!-- 3. MITZNEPHET — turban -->
        <g class="garment" data-key="mitznephet">
          <path d="M 175,120 Q 165,80 240,68 Q 315,80 305,120 Q 300,108 240,100 Q 180,108 175,120 Z" fill="url(#gLinen)" stroke="rgba(150,120,60,.55)" stroke-width="1.2"/>
          <path d="M 178,108 Q 220,90 240,90 Q 260,90 302,108" fill="none" stroke="rgba(150,120,60,.4)" stroke-width="0.7"/>
          <path d="M 182,98 Q 220,82 240,82 Q 260,82 298,98" fill="none" stroke="rgba(150,120,60,.4)" stroke-width="0.7"/>
        </g>

        <!-- 4. TZITZ — golden plate / holy crown -->
        <g class="garment" data-key="tzitz">
          <!-- blue cord around turban -->
          <path d="M 174,118 Q 240,128 306,118" fill="none" stroke="url(#gBlue)" stroke-width="3" stroke-linecap="round"/>
          <!-- the plate itself -->
          <path d="M 200,114 Q 240,108 280,114 L 282,128 Q 240,135 198,128 Z" fill="url(#gPlateGold)" stroke="#7a5818" stroke-width="1.2"/>
          <!-- engraving -->
          <text x="240" y="125" font-family="Georgia,serif" font-size="7" fill="#5a3c08" text-anchor="middle" font-weight="700" letter-spacing="0.5">קֹדֶשׁ לַיהוה</text>
        </g>

        <!-- 5. ME'IL — blue robe of the ephod (long, to ankles) -->
        <g class="garment" data-key="meil">
          <!-- main body of robe -->
          <path d="M 130,260 Q 125,320 130,440 L 115,690 L 365,690 L 350,440 Q 355,320 350,260 Q 320,250 240,250 Q 160,250 130,260 Z" fill="url(#gBlue)" stroke="rgba(15,30,90,.6)" stroke-width="1.2"/>
          <!-- subtle vertical fold lines -->
          <path d="M 175,290 L 168,680" fill="none" stroke="rgba(0,0,0,.18)" stroke-width="1"/>
          <path d="M 240,290 L 240,680" fill="none" stroke="rgba(0,0,0,.18)" stroke-width="1"/>
          <path d="M 305,290 L 312,680" fill="none" stroke="rgba(0,0,0,.18)" stroke-width="1"/>
          <!-- neck opening -->
          <path d="M 215,250 Q 240,265 265,250" fill="none" stroke="url(#gGold)" stroke-width="2.5"/>
          <path d="M 215,250 Q 240,260 265,250" fill="rgba(255,220,100,.15)"/>

          <!-- HEM: alternating golden bells and pomegranates -->
          <g id="hemDecorations">
            <!-- 9 bells and 9 pomegranates alternating across the hem -->
            <!-- Bells (golden, dome shape with clapper) -->
            <g fill="url(#gGold)" stroke="#7a5818" stroke-width="0.5">
              <path d="M 130,690 Q 130,680 138,680 Q 146,680 146,690 Z"/>
              <circle cx="138" cy="694" r="1.4"/>
              <path d="M 165,690 Q 165,680 173,680 Q 181,680 181,690 Z"/>
              <circle cx="173" cy="694" r="1.4"/>
              <path d="M 200,690 Q 200,680 208,680 Q 216,680 216,690 Z"/>
              <circle cx="208" cy="694" r="1.4"/>
              <path d="M 235,690 Q 235,680 243,680 Q 251,680 251,690 Z"/>
              <circle cx="243" cy="694" r="1.4"/>
              <path d="M 270,690 Q 270,680 278,680 Q 286,680 286,690 Z"/>
              <circle cx="278" cy="694" r="1.4"/>
              <path d="M 305,690 Q 305,680 313,680 Q 321,680 321,690 Z"/>
              <circle cx="313" cy="694" r="1.4"/>
              <path d="M 340,690 Q 340,680 348,680 Q 356,680 356,690 Z"/>
              <circle cx="348" cy="694" r="1.4"/>
            </g>
            <!-- Pomegranates (alternating blue, purple, scarlet) -->
            <g stroke="#3a1010" stroke-width="0.4">
              <ellipse cx="156" cy="685" rx="4" ry="5" fill="url(#gBlue)"/>
              <path d="M 156,679 L 156,675 M 154,675 L 158,675" stroke="#5a4818" stroke-width="0.6"/>
              <ellipse cx="190" cy="685" rx="4" ry="5" fill="url(#gPurple)"/>
              <path d="M 190,679 L 190,675 M 188,675 L 192,675" stroke="#5a4818" stroke-width="0.6"/>
              <ellipse cx="225" cy="685" rx="4" ry="5" fill="url(#gScarlet)"/>
              <path d="M 225,679 L 225,675 M 223,675 L 227,675" stroke="#5a4818" stroke-width="0.6"/>
              <ellipse cx="260" cy="685" rx="4" ry="5" fill="url(#gBlue)"/>
              <path d="M 260,679 L 260,675 M 258,675 L 262,675" stroke="#5a4818" stroke-width="0.6"/>
              <ellipse cx="295" cy="685" rx="4" ry="5" fill="url(#gPurple)"/>
              <path d="M 295,679 L 295,675 M 293,675 L 297,675" stroke="#5a4818" stroke-width="0.6"/>
              <ellipse cx="330" cy="685" rx="4" ry="5" fill="url(#gScarlet)"/>
              <path d="M 330,679 L 330,675 M 328,675 L 332,675" stroke="#5a4818" stroke-width="0.6"/>
            </g>
          </g>
        </g>

        <!-- 6. EPHOD — colored apron over the robe (shorter, to thigh) -->
        <g class="garment" data-key="ephod">
          <!-- back of ephod (just shoulder straps over the robe) -->
          <path d="M 145,265 Q 240,255 335,265 L 340,290 Q 240,275 140,290 Z" fill="url(#gEphod)" stroke="rgba(80,40,20,.6)" stroke-width="1"/>
          <!-- front apron -->
          <path d="M 155,290 L 145,490 L 335,490 L 325,290 Q 240,278 155,290 Z" fill="url(#gEphod)" stroke="rgba(80,40,20,.6)" stroke-width="1.2"/>
          <!-- gold thread weaving — diagonal lines suggesting the gold-woven pattern -->
          <g opacity="0.28" stroke="url(#gGold)" stroke-width="0.6" fill="none">
            <path d="M 155,310 L 335,310"/>
            <path d="M 152,335 L 333,335"/>
            <path d="M 150,360 L 332,360"/>
            <path d="M 148,385 L 332,385"/>
            <path d="M 147,410 L 333,410"/>
            <path d="M 146,435 L 334,435"/>
            <path d="M 145,460 L 335,460"/>
          </g>
          <!-- gold woven sash at top -->
          <rect x="155" y="285" width="170" height="9" fill="url(#gGold)" opacity="0.85" stroke="#7a5818" stroke-width="0.5"/>
        </g>

        <!-- 7. SHOULDER STONES — onyx with tribal names (PART OF EPHOD but separate clickable) -->
        <g class="garment" data-key="shoulders">
          <!-- left shoulder stone -->
          <ellipse cx="170" cy="278" rx="22" ry="14" fill="url(#gShoulderStone)" stroke="url(#gGold)" stroke-width="2.5"/>
          <text x="170" y="282" font-family="Georgia,serif" font-size="6" fill="rgba(212,175,55,0.9)" text-anchor="middle" font-style="italic">6 שְׁבָטִים</text>
          <!-- right shoulder stone -->
          <ellipse cx="310" cy="278" rx="22" ry="14" fill="url(#gShoulderStone)" stroke="url(#gGold)" stroke-width="2.5"/>
          <text x="310" y="282" font-family="Georgia,serif" font-size="6" fill="rgba(212,175,55,0.9)" text-anchor="middle" font-style="italic">6 שְׁבָטִים</text>
        </g>

        <!-- 8. AVNET — sash/girdle around waist -->
        <g class="garment" data-key="avnet">
          <rect x="146" y="490" width="188" height="18" fill="url(#gPurple)" stroke="rgba(80,40,20,.6)" stroke-width="0.8"/>
          <!-- decorative stripes representing the four colors -->
          <rect x="146" y="492" width="188" height="3" fill="url(#gBlue)" opacity="0.85"/>
          <rect x="146" y="498" width="188" height="3" fill="url(#gScarlet)" opacity="0.85"/>
          <rect x="146" y="504" width="188" height="2.5" fill="url(#gLinen)" opacity="0.7"/>
          <!-- gold thread accent -->
          <path d="M 146,489 L 334,489" stroke="url(#gGold)" stroke-width="0.6"/>
          <path d="M 146,508 L 334,508" stroke="url(#gGold)" stroke-width="0.6"/>
        </g>

        <!-- 9. CHOSHEN — breastplate of judgment with 12 stones -->
        <g class="garment" data-key="choshen">
          <!-- gold chains connecting to shoulders -->
          <path d="M 178,290 Q 195,330 204,355" fill="none" stroke="url(#gGold)" stroke-width="2"/>
          <path d="M 302,290 Q 285,330 276,355" fill="none" stroke="url(#gGold)" stroke-width="2"/>
          <!-- breastplate backing (gold-edged) -->
          <rect x="195" y="345" width="90" height="100" rx="4" fill="url(#gEphod)" stroke="url(#gGold)" stroke-width="3" opacity="0.95"/>
          <!-- inner border -->
          <rect x="200" y="350" width="80" height="90" rx="2" fill="none" stroke="url(#gGold)" stroke-width="1" opacity="0.7"/>

          <!-- 12 STONES: 4 rows of 3 -->
          <!-- Row 1: Reuben, Simeon, Levi -->
          <circle class="stone-mini" cx="217" cy="365" r="8.5" fill="#d92020" stroke="#7a5818" stroke-width="1.2"/>
          <circle class="stone-mini" cx="240" cy="365" r="8.5" fill="#d4d020" stroke="#7a5818" stroke-width="1.2"/>
          <circle class="stone-mini" cx="263" cy="365" r="8.5" fill="#0d9c4a" stroke="#7a5818" stroke-width="1.2"/>
          <!-- Row 2: Judah, Dan, Naphtali -->
          <circle class="stone-mini" cx="217" cy="388" r="8.5" fill="#1cb578" stroke="#7a5818" stroke-width="1.2"/>
          <circle class="stone-mini" cx="240" cy="388" r="8.5" fill="#1438a8" stroke="#7a5818" stroke-width="1.2"/>
          <circle class="stone-mini" cx="263" cy="388" r="8.5" fill="#f0f0e8" stroke="#7a5818" stroke-width="1.2"/>
          <!-- Row 3: Gad, Asher, Issachar -->
          <circle class="stone-mini" cx="217" cy="411" r="8.5" fill="#e07020" stroke="#7a5818" stroke-width="1.2"/>
          <circle class="stone-mini" cx="240" cy="411" r="8.5" fill="#a07050" stroke="#7a5818" stroke-width="1.2"/>
          <circle class="stone-mini" cx="263" cy="411" r="8.5" fill="#9430b8" stroke="#7a5818" stroke-width="1.2"/>
          <!-- Row 4: Zebulun, Joseph, Benjamin -->

function renderGarment(key) {
  const d = GARMENTS[key];

function lighten(hex) {
  const n = parseInt(hex.replace('#',''),16);
  const r = Math.min(255, ((n>>16)&255) + 80);
  const g = Math.min(255, ((n>>8)&255) + 80);
  const b = Math.min(255, (n&255) + 80);
  return `rgb(${r},${g},${b})`;
}
function darken(hex) {
  const n = parseInt(hex.replace('#',''),16);
  const r = Math.max(0, ((n>>16)&255) - 60);
  const g = Math.max(0, ((n>>8)&255) - 60);
  const b = Math.max(0, (n&255) - 60);
  return `rgb(${r},${g},${b})`;
}

// CLICK HANDLERS
// ============================================================================

function clearActive() {
  document.querySelectorAll('.garment.active, .stone.active, .label-link.active').forEach(el => el.classList.remove('active'));
}

// Helper — handle a click on either a garment OR its label, since they should behave identically
function activateGarment(key) {
  if (key === 'choshen') {
    showBreastplateScene();
    return;
  }
  // If we were in Yom Kippur or Christ mode, drop back to Full so the panel content is the garment, not the synthesis
  if (currentMode !== 'full') setMode('full');
  clearActive();
  const g = document.querySelector(`.garment[data-key="${key}"]`);
  const l = document.querySelector(`.label-link[data-key="${key}"]`);
  if (g) g.classList.add('active');
  if (l) l.classList.add('active');
  renderGarment(key);
}

document.querySelectorAll('.garment').forEach(el => {
  el.addEventListener('click', e => {
    e.stopPropagation();
    activateGarment(el.dataset.key);
  });
});

document.querySelectorAll('.label-link').forEach(el => {
  el.addEventListener('click', e => {
    e.stopPropagation();
    activateGarment(el.dataset.key);
  });
});

document.querySelectorAll('.stone').forEach(el => {
  el.addEventListener('click', e => {
    e.stopPropagation();
    const key = el.dataset.stone;
    clearActive();
    el.classList.add('active');
    renderTribe(key);
  });
});

// Close panel
document.getElementById('pc').addEventListener('click', () => {
  panel.classList.remove('open');
  clearActive();
  // If a mode panel was open, dropping the panel returns to Full mode
  if (currentMode !== 'full') setMode('full');
});

function applyYomKippurDimming(on) {
  const keys = ['meil','ephod','choshen','shoulders','avnet','tzitz'];
  if (on) {
    priestSvg.querySelector('[data-key="meil"]').style.opacity = '0.18';
    priestSvg.querySelector('[data-key="ephod"]').style.opacity = '0.15';
    priestSvg.querySelector('[data-key="choshen"]').style.opacity = '0.18';
    priestSvg.querySelector('[data-key="shoulders"]').style.opacity = '0.2';
    priestSvg.querySelector('[data-key="avnet"]').style.opacity = '0.25';
    priestSvg.querySelector('[data-key="tzitz"]').style.opacity = '0.25';
  } else {
    keys.forEach(k => {
      priestSvg.querySelector(`[data-key="${k}"]`).style.opacity = '';
    });
  }
}

function setMode(mode) {
  // Reset visual state
  applyYomKippurDimming(false);
  priestSvg.classList.remove('christ-mode');

  // Apply new mode visuals
  if (mode === 'yom') {
    applyYomKippurDimming(true);
  } else if (mode === 'christ') {
    priestSvg.classList.add('christ-mode');
  }

  // Update button states
  [vFull, vYom, vChrist].forEach(b => b.classList.remove('on'));
  if (mode === 'full') vFull.classList.add('on');
  else if (mode === 'yom') vYom.classList.add('on');
  else if (mode === 'christ') vChrist.classList.add('on');

  currentMode = mode;

  // Open relevant teaching panel
  if (mode === 'yom') openYomKippurPanel();
  else if (mode === 'christ') openChristFulfillsPanel();
  else { panel.classList.remove('open'); clearActive(); }
}

vFull.addEventListener('click', () => setMode('full'));
vYom.addEventListener('click', () => setMode('yom'));

    <div class="ps">
      <div class="psl">He IS the High Priest</div>
      <div class="ptx">Hebrews says it directly. Jesus is not <em>like</em> the High Priest. Jesus <strong>is</strong> the High Priest. After the order of Melchizedek (Hebrews 6:20). With <em>'an unchangeable priesthood'</em> (Hebrews 7:24). Who <em>'ever liveth to make intercession'</em> for us (Hebrews 7:25). Who <em>'by his own blood... entered in once into the holy place, having obtained eternal redemption'</em> (Hebrews 9:12).<br><br>Every garment we have just walked through — every word, every color, every stone, every thread — was a shadow cast backward through time from one Person. The whole vestment is His Person.</div>
    </div>
    <hr class="dv">

    <div class="ps">
      <div class="psl">Every Piece Becomes One Portrait</div>
      <div class="ptx">
        <strong>Tzitz · Holiness to the LORD</strong> — He alone is wholly holy. <em>'Holy, harmless, undefiled, separate from sinners, and made higher than the heavens'</em> (Hebrews 7:26).<br><br>
        <strong>Mitznephet · The Turban</strong> — His mind perfectly consecrated to the Father. <em>'Let this mind be in you, which was also in Christ Jesus'</em> (Philippians 2:5).<br><br>
        <strong>Shoulder Stones · Twelve Names</strong> — every soul carried in His government. <em>'The government shall be upon his shoulder'</em> (Isaiah 9:6). <em>'He layeth it on his shoulders, rejoicing'</em> (Luke 15:5).<br><br>
        <strong>Choshen · The Breastplate</strong> — every covenant name held over His heart in the very throne room of God. <em>'For Christ is not entered into the holy places made with hands... but into heaven itself, now to appear in the presence of God for us'</em> (Hebrews 9:24).<br><br>
        <strong>Ephod · Gold Woven Into Linen</strong> — divinity inseparable from humanity. <em>'And the Word was made flesh, and dwelt among us, and we beheld his glory'</em> (John 1:14).<br><br>
        <strong>Me'il · The Seamless Robe</strong> — His priestly identity unbroken even at the cross. <em>'Now the coat was without seam, woven from the top throughout'</em> (John 19:23).<br><br>
        <strong>Bells &amp; Pomegranates</strong> — the sound of mercy still ringing as He moves in the holy place. <em>'And, behold, a woman... touched the hem of his garment... And straightway the fountain of her blood was dried up'</em> (Mark 5:27, 29).<br><br>
        <strong>Avnet · The Sash</strong> — the girded servant who laid aside His glory to wash our feet. <em>'He riseth from supper, and laid aside his garments; and took a towel, and girded himself'</em> (John 13:4).<br><br>
        <strong>Kethoneth · White Linen Tunic</strong> — His righteousness given to us. <em>'For he hath made him to be sin for us, who knew no sin; that we might be made the righteousness of God in him'</em> (2 Corinthians 5:21).<br><br>
        <strong>Mikhnesei · The Hidden Linen</strong> — the first covering, His grace clothing our exposed selves. <em>'Unto Adam also and to his wife did the LORD God make coats of skins, and clothed them'</em> (Genesis 3:21).<br><br>
        <strong>Urim and Thummim · Lights and Perfections</strong> — He is the Light. He is the Perfection. <em>'I am the light of the world'</em> (John 8:12). <em>'For by one offering he hath perfected for ever them that are sanctified'</em> (Hebrews 10:14).
      </div>
    </div>
    <hr class="dv">

    <div class="ps">
      <div class="psl">He Entered, And We Enter Through Him</div>
      <div class="ptx">The veil that separated the Holy Place from the Holy of Holies — Hebrews names it directly: <em>'a new and living way, which he hath consecrated for us, through the veil, that is to say, his flesh'</em> (Hebrews 10:19-20).<br><br>The veil <strong>is</strong> His body. When the curtain in the temple tore from top to bottom at His death (Matthew 27:51), it was God Himself rending the barrier from the divine side. The wall came down because the body that was the wall had been broken open in love.<br><br>The blood — once for all. The Greek word is <em>ephapax</em>: <em>'once into the holy place... eternal redemption'</em> (Hebrews 9:12). No second sacrifice. No additional payment. No insufficiency that needs supplementing. The High Priest entered, the names were carried, the blood was applied, and the work was finished.<br><br>We do not approach God hoping a priest will plead our case. We approach knowing the Priest is Christ Himself. He has already entered. He is carrying us. He stands eternally before the Father with our names on His heart and His blood on the mercy seat.</div>
    </div>
    <hr class="dv">

    <div class="ps">
      <div class="psl">The High Priest Who Lives Forever</div>
      <div class="ptx">Aaron took off the garments at the end of the day. Christ does not.<br><br><strong>Right now</strong>, in this moment, He is clothed in the eternal vestment. <strong>Right now</strong>, every covenant name is over His heart. <strong>Right now</strong>, the bells of His mercy are ringing because the High Priest is alive in the Holy Place. <strong>Right now</strong>, the blood He offered is satisfying every demand of justice forever.<br><br><em>'Wherefore he is able also to save them to the uttermost that come unto God by him, seeing he ever liveth to make intercession for them'</em> (Hebrews 7:25).<br><br>The whole vestment is Him. The whole law was always pointing here. The whole story is one Savior, fully clothed, eternally interceding, infinitely able.<br><br><strong>Come boldly. The High Priest is Christ.</strong></div>
    </div>
  `;
  panel.classList.add('open');

backend:
  name: github
  repo: caydenfarris4/website
  branch: main
  auth_type: pkce
  app_id: YOUR_GITHUB_CLIENT_ID

media_folder: "images/blog"
public_folder: "/images/blog"
publish_mode: editorial_workflow

collections:

  - name: "ancient-paths"
    label: "✦ Ancient Paths"
    label_singular: "Ancient Paths Post"
    folder: "blog/ancient-paths/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "2-3 sentences for the blog card" }
      - { label: "Volume", name: "volume", widget: "string", default: "Vol. 1" }
      - { label: "Read time (min)", name: "readtime", widget: "number", default: 10 }
      - { label: "Date", name: "date", widget: "date", format: "MMMM D, YYYY" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - label: "Hebrew Word Study"
        name: "hebrew"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Hebrew Characters", name: "chars", widget: "string", required: false }
          - { label: "Transliteration", name: "translit", widget: "string", required: false }
          - { label: "Word Title", name: "word_title", widget: "string", required: false }
          - { label: "Definition", name: "definition", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Reflection Questions"
        name: "reflection"
        widget: "list"
        required: false
        collapsed: true
        field: { label: "Question", name: "question", widget: "string" }
      - { label: "Next post title", name: "next_title", widget: "string", required: false }
      - { label: "Next post slug", name: "next_slug", widget: "string", required: false }

  - name: "the-work"
    label: "⬛ The Work"
    label_singular: "The Work Post"
    folder: "blog/the-work/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "2-3 sentences for the blog card" }
      - { label: "Volume", name: "volume", widget: "string", default: "Vol. 1" }
      - { label: "Read time (min)", name: "readtime", widget: "number", default: 7 }
      - { label: "Date", name: "date", widget: "date", format: "MMMM D, YYYY" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Key Principle (pull quote)", name: "key_principle", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Reflection Questions"
        name: "reflection"
        widget: "list"
        required: false
        collapsed: true
        field: { label: "Question", name: "question", widget: "string" }
      - { label: "Next post title", name: "next_title", widget: "string", required: false }
      - { label: "Next post slug", name: "next_slug", widget: "string", required: false }

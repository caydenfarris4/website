<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cayden Farris — CMS</title>
</head>
<body>
<script>
// Load config before Decap initializes
window.CMS_MANUAL_INIT = true;
</script>
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
<script>
CMS.init({
  config: {
    backend: {
      name: 'github',
      repo: 'caydenfarris4/website',
      branch: 'main',
      auth_type: 'pkce',
      app_id: 'Ov23liFPYknATA7Zivr7'
    },
    media_folder: 'images/blog',
    public_folder: '/images/blog',
    collections: [
      {
        name: 'ancient-paths',
        label: 'Ancient Paths',
        folder: 'blog/ancient-paths/posts',
        create: true,
        slug: '{{slug}}',
        fields: [
          { label: 'Title', name: 'title', widget: 'string' },
          { label: 'Subtitle', name: 'subtitle', widget: 'string', required: false },
          { label: 'Excerpt', name: 'excerpt', widget: 'text' },
          { label: 'Volume', name: 'volume', widget: 'string', default: 'Vol. 1' },
          { label: 'Read time (min)', name: 'readtime', widget: 'number', default: 10 },
          { label: 'Date', name: 'date', widget: 'string' },
          { label: 'Body', name: 'body', widget: 'markdown' },
          {
            label: 'Reflection Questions', name: 'reflection', widget: 'list', required: false,
            field: { label: 'Question', name: 'question', widget: 'string' }
          },
          { label: 'Next post title', name: 'next_title', widget: 'string', required: false },
          { label: 'Next post slug', name: 'next_slug', widget: 'string', required: false }
        ]
      },
      {
        name: 'the-work',
        label: 'The Work',
        folder: 'blog/the-work/posts',
        create: true,
        slug: '{{slug}}',
        fields: [
          { label: 'Title', name: 'title', widget: 'string' },
          { label: 'Subtitle', name: 'subtitle', widget: 'string', required: false },
          { label: 'Excerpt', name: 'excerpt', widget: 'text' },
          { label: 'Volume', name: 'volume', widget: 'string', default: 'Vol. 1' },
          { label: 'Read time (min)', name: 'readtime', widget: 'number', default: 7 },
          { label: 'Date', name: 'date', widget: 'string' },
          { label: 'Key Principle', name: 'key_principle', widget: 'string', required: false },
          { label: 'Body', name: 'body', widget: 'markdown' },
          {
            label: 'Reflection Questions', name: 'reflection', widget: 'list', required: false,
            field: { label: 'Question', name: 'question', widget: 'string' }
          },
          { label: 'Next post title', name: 'next_title', widget: 'string', required: false },
          { label: 'Next post slug', name: 'next_slug', widget: 'string', required: false }
        ]
      }
    ]
  }
});
</script>
</body>
</html>
